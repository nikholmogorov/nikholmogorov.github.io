name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-root:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy root files
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          target-folder: .

  build-projects:
    runs-on: ubuntu-latest
    needs: deploy-root
    strategy:
      matrix:
        project: [calc, maze, memory-game, seku, todo]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies for ${{ matrix.project }}
        run: |
          cd projects/${{ matrix.project }}
          npm install

      - name: Build ${{ matrix.project }}
        run: |
          cd projects/${{ matrix.project }}
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: projects/${{ matrix.project }}/dist

  deploy-projects:
    runs-on: ubuntu-latest
    needs: build-projects
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: ./builds

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy/projects

          for project in calc maze memory-game seku todo; do
            if [ -d "builds/build-$project" ]; then
              echo "Copying $project..."
              mkdir -p "deploy/projects/$project"
              cp -r "builds/build-$project/"* "deploy/projects/$project/"
            fi
          done

      - name: Deploy all projects
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy
          clean: false
          target-folder: .