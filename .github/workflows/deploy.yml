name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: 'Perform a clean deploy (removes all old files)'
        required: false
        type: boolean
        default: false

jobs:
  deploy-root:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy root static files
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: ${{ github.event.inputs.clean_deploy || false }}
          target-folder: .

  build-projects:
    runs-on: ubuntu-latest
    needs: deploy-root
    strategy:
      matrix:
        project: [calc, maze, memory-game, seku, todo]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: projects/${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: projects/${{ matrix.project }}
        run: npm ci

      - name: Build project with dynamic base path
        working-directory: projects/${{ matrix.project }}
        run: |
          BASE_PATH="/projects/${{ matrix.project }}/"
          echo "Building ${{ matrix.project }} with base=$BASE_PATH"

          npm run build -- --base="$BASE_PATH"

          if [ ! -d "dist" ]; then
            echo "Build failed: 'dist' directory not created"
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "Build failed: 'dist/index.html' not found"
            exit 1
          fi

          echo "Build successful. Contents of dist:"
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: projects/${{ matrix.project }}/dist
          retention-days: 1

  deploy-projects:
    runs-on: ubuntu-latest
    needs: build-projects
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./builds

      - name: Prepare deployment folder structure
        run: |
          mkdir -p deploy/projects

          echo "Preparing projects for deployment..."
          for project in calc maze memory-game seku todo; do
            artifact_dir="builds/build-$project"
            target_dir="deploy/projects/$project"

            if [ -d "$artifact_dir" ]; then
              echo "Copying $project from $artifact_dir to $target_dir"
              mkdir -p "$target_dir"
              cp -r "$artifact_dir"/* "$target_dir/"

              if [ ! -f "$target_dir/index.html" ]; then
                echo "WARNING: index.html not found in $target_dir"
              else
                echo "index.html present"
              fi
            else
              echo "ERROR: Artifact for $project not found at $artifact_dir"
              exit 1
            fi
          done

          echo "Final deployment structure:"
          tree deploy/ || ls -R deploy/

      - name: Deploy all projects to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy
          clean: ${{ github.event.inputs.clean_deploy || false }}
          target-folder: .